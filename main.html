<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>JOB APPLICATION FORM</h1>
    <form action="post">
        <label for="Name">Name</label>
        <input type="text" id="name" required><br><br>

         <label for="Email">Email</label>
        <input type="Email" id="Email" required><br><br>

        <label for="Male">Mail</label>
        <input type="radio"  required>

        <label for="Female">Female</label>
        <input type="radio" required><br><br>

        <label for="cars">Laptop Brands:</label>
        <select id="laptop" required>
            <option value="">--Please choose an option--</option>
            <option value="Apple">Apple</option>
            <option value="A">Auss</option>
            <option value="HP">HP</option><br><br>
        </select><br><br>
        <label for="age">Age</label>
        <input type="number" id="age" required><br><br>

          <label for="date">Date of Birth</label>
        <input type="date" id="dob" required><br><br>

        <label for="Password">Password</label>
        <input type="password" id="Password" required><br><br>

         <label for="portfolio">Portfolio URL</label><br>
        <input type="url" id="portfolio" name="portfolio"><br><br>

        <button type="SUBMIT">SUBMIT</button>

    </form>
</body>
</html>
